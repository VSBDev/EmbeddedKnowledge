name: validate

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: read

jobs:
  agent-protocol:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Rebuild all generated output from source
        run: npm run graph:build && npm run site:build
      - name: Verify committed generated output matches a fresh build
        run: |
          if ! git diff --exit-code -- site/; then
            echo "::error::Committed generated files under site/ do not match a fresh build."
            echo "The files above were committed by hand or are stale. Run:"
            echo "  npm run graph:build && npm run site:build"
            echo "locally and commit the resulting site/ changes."
            exit 1
          fi
      - run: npm run validate
      - name: Verify structured review provenance
        if: github.event_name == 'pull_request'
        run: node scripts/validate-pr-review-provenance.mjs
        env:
          GITHUB_TOKEN: ${{ github.token }}
      - name: Verify lesson merge readiness
        if: github.event_name == 'pull_request'
        run: node scripts/validate-lesson-pr.mjs
      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium
      - run: npm test
