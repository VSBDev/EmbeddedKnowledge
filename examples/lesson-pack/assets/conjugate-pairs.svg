<svg xmlns="http://www.w3.org/2000/svg" width="800" height="300" viewBox="0 0 800 300" role="img" aria-labelledby="title desc">
  <title id="title">Conjugate acid-base pairs</title>
  <desc id="desc">Acetate points to acetic acid, and water points to hydroxide. Each pair differs by one proton.</desc>
  <rect x="24" y="40" width="210" height="70" rx="12" fill="#eef6ff" stroke="#24557a" stroke-width="3" />
  <text x="129" y="70" text-anchor="middle" font-size="22" fill="#102b3f">CH₃COO⁻</text>
  <text x="129" y="96" text-anchor="middle" font-size="16" fill="#102b3f">base</text>
  <line x1="244" y1="75" x2="544" y2="75" stroke="#374151" stroke-width="4" />
  <path d="M544 75 L522 63 L522 87 Z" fill="#374151" />
  <text x="394" y="58" text-anchor="middle" font-size="16" fill="#111827">gains one proton</text>
  <rect x="554" y="40" width="220" height="70" rx="12" fill="#fff7ed" stroke="#9a4c13" stroke-width="3" />
  <text x="664" y="70" text-anchor="middle" font-size="22" fill="#4a240b">CH₃COOH</text>
  <text x="664" y="96" text-anchor="middle" font-size="16" fill="#4a240b">conjugate acid</text>
  <rect x="24" y="190" width="210" height="70" rx="12" fill="#fff7ed" stroke="#9a4c13" stroke-width="3" />
  <text x="129" y="220" text-anchor="middle" font-size="22" fill="#4a240b">H₂O</text>
  <text x="129" y="246" text-anchor="middle" font-size="16" fill="#4a240b">acid</text>
  <line x1="244" y1="225" x2="544" y2="225" stroke="#374151" stroke-width="4" />
  <path d="M544 225 L522 213 L522 237 Z" fill="#374151" />
  <text x="394" y="208" text-anchor="middle" font-size="16" fill="#111827">loses one proton</text>
  <rect x="554" y="190" width="220" height="70" rx="12" fill="#eef6ff" stroke="#24557a" stroke-width="3" />
  <text x="664" y="220" text-anchor="middle" font-size="22" fill="#102b3f">OH⁻</text>
  <text x="664" y="246" text-anchor="middle" font-size="16" fill="#102b3f">conjugate base</text>
</svg>
